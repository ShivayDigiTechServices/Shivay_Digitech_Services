<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIVAY MOCK SERVICES - TCS CBT Exam Portal</title>
    <style>
        :root {
            --tcs-blue: #0f2c59;
            --tcs-light-blue: #1e4a8a;
            --tcs-orange: #ff9933;
            --green-saved: #2d8a4e;
            --red-unanswered: #c9302c;
            --purple-review: #7b1fa2;
            --gray-unvisited: #f4f4f4;
            --border-color: #d3d3d3;
            --text-dark: #333333;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: var(--text-dark);
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header */
        .top-header {
            background-color: #ffffff;
            color: var(--tcs-blue);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--tcs-blue);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 18px;
            font-weight: bold;
        }

        .exam-title-badge {
            font-size: 13px;
            font-weight: bold;
            color: white;
            background-color: var(--tcs-blue);
            padding: 6px 12px;
            border-radius: 4px;
        }

        /* Split Screen Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Side Question Area (70%) */
        .question-panel {
            width: 70%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .q-header-bar {
            background-color: #f4f7f9;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
        }

        .question-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .q-num-badge {
            background-color: var(--tcs-blue);
            color: white;
            padding: 4px 10px;
            font-weight: bold;
            border-radius: 3px;
            margin-right: 10px;
        }

        .q-text-section {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 15px;
        }

        .lang-text.hindi {
            color: #1a5276;
            margin-top: 12px;
        }

        .options-group {
            margin-top: 15px;
        }

        .option-label {
            display: flex;
            align-items: center;
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: #f0f4f8;
            border-color: var(--tcs-light-blue);
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Right Side Sidebar Panel (30%) */
        .sidebar-panel {
            width: 30%;
            background-color: #f4f5f7;
            display: flex;
            flex-direction: column;
        }

        .candidate-card {
            background-color: #ffffff;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .photo-box {
            width: 55px;
            height: 65px;
            background-color: #eaeaea;
            border: 1px solid #ccc;
            text-align: center;
            line-height: 65px;
            font-size: 11px;
            font-weight: bold;
        }

        .timer-container {
            background-color: #ffebee;
            color: var(--red-unanswered);
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
        }

        .palette-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .grid-item {
            aspect-ratio: 1;
            border: 1px solid var(--border-color);
            background-color: var(--gray-unvisited);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .grid-item.active {
            outline: 2px solid var(--tcs-light-blue);
        }

        /* TCS Status Colors */
        .status-saved { background-color: var(--green-saved) !important; color: white; }
        .status-unanswered { background-color: var(--red-unanswered) !important; color: white; }
        .status-review { background-color: var(--purple-review) !important; color: white; }

        /* Footer Controls */
        .footer-bar {
            background-color: #f4f7f9;
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .footer-btn {
            padding: 10px 22px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background-color: #ffffff;
        }

        .btn-save-next {
            background-color: var(--tcs-light-blue);
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header class="top-header">
        <div class="brand-title">SHIVAY MOCK SERVICES</div>
        <div class="exam-title-badge">CBT Mock Test Series</div>
    </header>

    <!-- Main Working Interface -->
    <div class="main-container">
        <section class="question-panel">
            <div class="q-header-bar">SECTION: Core Question Paper</div>
            <div class="question-area" id="question-render"></div>
        </section>

        <aside class="sidebar-panel">
            <div class="timer-container" id="time-left">⏳ Time Left: 60:00</div>
            
            <div class="candidate-card">
                <div class="photo-box">PHOTO</div>
                <div>
                    <strong>CBT Candidate</strong><br>
                    Roll No: SHIVAY-2026
                </div>
            </div>

            <div class="palette-container">
                <div style="font-size: 12px; font-weight: bold; color: #555;">QUESTION PALETTE</div>
                <div class="grid-matrix" id="question-grid"></div>
            </div>
        </aside>
    </div>

    <!-- Bottom Buttons -->
    <footer class="footer-bar">
        <div>
            <button class="footer-btn" onclick="clearAnswer()">Clear Response</button>
            <button class="footer-btn" style="color: var(--purple-review);" onclick="markForReview()">Mark for Review & Next</button>
        </div>
        <button class="footer-btn btn-save-next" id="next-btn" onclick="saveAndNext()">Save & Next</button>
    </footer>

    <script>
        // ==========================================
        // ✍️ यहाँ अपने प्रश्न और उत्तर अपडेट करें (EDIT QUESTIONS HERE)
        // ==========================================
        const quizQuestions = [
            { 
                qE: "According to Rig Veda, Shambara was a very powerful king of which tribe?", 
                qH: "ऋग्वेद के अनुसार, शंबर किस जनजाति का एक बहुत शक्तिशाली राजा था?", 
                options: ["Khash", "Kiratas", "Khampa", "Audumbaras"], 
                correct: 1 
            },
            { 
                qE: "Shambara possessed how many strong mountain forts between the Beas and Yamuna rivers?", 
                qH: "ब्यास और यमुना नदियों के बीच शंबर के पास कितने मजबूत पहाड़ी किले थे?", 
                options: ["99 Forts", "50 Forts", "40 Forts", "75 Forts"], 
                correct: 0 
            },
            { 
                qE: "Against which Aryan King did Shambara fight a fierce 40-year-long war?", 
                qH: "शंबर ने किस आर्य राजा के खिलाफ 40 साल तक भीषण युद्ध लड़ा था?", 
                options: ["Sudas", "Divodas", "Varchi", "Rigveda"], 
                correct: 1 
            },
            { 
                qE: "Which of the following is considered volatile memory in a computer system?", 
                qH: "कंप्यूटर सिस्टम में निम्नलिखित में से किसे वोलेटाइल मेमोरी माना जाता है?", 
                options: ["ROM", "Hard Disk", "RAM", "Flash Drive"], 
                correct: 2 
            }
        ];
        // ==========================================
        // इसके नीचे के कोड को बदलने की जरूरत नहीं है
        // ==========================================

        let currentIdx = 0;
        let studentAnswers = new Array(quizQuestions.length).fill(null);
        let questionStatuses = new Array(quizQuestions.length).fill('unvisited');

        function loadQuestion() {
            if (quizQuestions.length === 0) return;

            const q = quizQuestions[currentIdx];
            const container = document.getElementById('question-render');
            
            let html = `
                <div class="q-text-section">
                    <div class="lang-text english"><span class="q-num-badge">Question ${currentIdx + 1}</span><strong>${q.qE}</strong></div>
                    <div class="lang-text hindi"><span class="q-num-badge">प्रश्न ${currentIdx + 1}</span><strong>${q.qH}</strong></div>
                </div>
                <div class="options-group">
            `;

            q.options.forEach((opt, index) => {
                let isChecked = (studentAnswers[currentIdx] === index) ? "checked" : "";
                html += `
                    <label class="option-label" onclick="selectOpt(${index})">
                        <input type="radio" name="q-ans" id="opt-${index}" ${isChecked}>
                        <span>${opt}</span>
                    </label>
                `;
            });

            container.innerHTML = html + `</div>`;
            
            // Grid Item Active Highlighting
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active'));
            const currentGridItem = document.getElementById("grid-q-" + (currentIdx + 1));
            if(currentGridItem) currentGridItem.classList.add('active');
            
            document.getElementById('next-btn').innerText = (currentIdx === quizQuestions.length - 1) ? "Submit Test" : "Save & Next";
        }

        function selectOpt(index) {
            studentAnswers[currentIdx] = index;
            document.getElementById(`opt-${index}`).checked = true;
        }

        function clearAnswer() {
            studentAnswers[currentIdx] = null;
            document.querySelectorAll('input[name="q-ans"]').forEach(el => el.checked = false);
            questionStatuses[currentIdx] = 'unanswered';
            updateGridVisuals();
        }

        function markForReview() {
            questionStatuses[currentIdx] = 'review';
            updateGridVisuals();
            proceedNext();
        }

        function saveAndNext() {
            questionStatuses[currentIdx] = (studentAnswers[currentIdx] !== null) ? 'saved' : 'unanswered';
            updateGridVisuals();
            proceedNext();
        }

        function proceedNext() {
            if (currentIdx < quizQuestions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                alert("Exam Submitted Successfully!");
            }
        }

        function buildGridPalette() {
            const grid = document.getElementById("question-grid");
            grid.innerHTML = "";
            for (let i = 1; i <= quizQuestions.length; i++) {
                const item = document.createElement("div");
                item.className = "grid-item";
                item.innerText = i;
                item.id = "grid-q-" + i;
                item.onclick = () => { currentIdx = i - 1; loadQuestion(); };
                grid.appendChild(item);
            }
            updateGridVisuals();
        }

        function updateGridVisuals() {
            for (let i = 0; i < quizQuestions.length; i++) {
                const item = document.getElementById("grid-q-" + (i + 1));
                if(item) {
                    item.className = "grid-item " + (questionStatuses[i] !== 'unvisited' ? 'status-' + questionStatuses[i] : '');
                }
            }
        }

        // 60 Minutes Countdown Timer
        let time = 60 * 60;
        setInterval(() => {
            let min = Math.floor(time / 60);
            let sec = time % 60;
            document.getElementById('time-left').innerText = `⏳ Time Left: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(time > 0) time--;
        }, 1000);

        // Initial Trigger
        buildGridPalette();
        loadQuestion();
    </script>
</body>
</html>
